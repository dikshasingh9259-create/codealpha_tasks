{% extends 'base.html' %}
{% block content %}
    <div class="card">
        <h2>Login</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn">Log In</button>
        </form>
        <p style="text-align: center; margin-top: 15px;">Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
    </div>
{% endblock %}

{% extends 'base.html' %}
{% block content %}
    <div class="card">
        <h2>Register</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn">Sign Up</button>
        </form>
        <p style="text-align: center; margin-top: 15px;">Already have an account? <a href="{% url 'login' %}">Login here</a></p>
    </div>
{% endblock %}

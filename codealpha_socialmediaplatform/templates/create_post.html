{% extends 'base.html' %}
{% block content %}
    <div class="card">
        <h2>Create a New Post</h2>
        <form method="POST" enctype="multipart/form-data">
            
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn">Share Post</button>
        </form>
    </div>
{% endblock %}
